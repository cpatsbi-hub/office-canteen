<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Canteen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{
  --amber:#c2692a;--green:#2d6a4f;--gold:#e8a020;--cream:#fdf8f2;--white:#fff;
  --text:#1a1a1a;--muted:#6b7280;--border:#e5e0d8;--shadow:0 4px 24px rgba(0,0,0,.10);
  --shadow2:0 8px 40px rgba(0,0,0,.18);--radius:20px;--present:#059669;--absent:#dc2626;
  --star:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;color:var(--text)}
#bg{position:fixed;inset:0;z-index:0;background:url('https://images.unsplash.com/photo-1631452180519-c014fe946bc7?w=1920&q=80') center/cover no-repeat}
#bg::after{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(12,40,25,.78) 0%,rgba(80,35,5,.65) 100%)}
#root{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column}

/* ── AUTH ── */
#authScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem}
.auth-brand{text-align:center;margin-bottom:1.75rem;color:#fff}
.auth-brand-icon{width:70px;height:70px;background:linear-gradient(135deg,var(--gold),var(--amber));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:2rem;color:#fff;box-shadow:0 8px 24px rgba(194,105,42,.4)}
.auth-brand h1{font-family:'Playfair Display',serif;font-size:1.9rem;letter-spacing:-.01em}
.auth-brand p{opacity:.75;font-size:.88rem;margin-top:.2rem}
.auth-card{background:rgba(255,255,255,.97);border-radius:var(--radius);width:100%;max-width:400px;overflow:hidden;box-shadow:var(--shadow2)}
.auth-card-body{padding:1.8rem}

/* returning-user pill */
.user-pill{display:flex;align-items:center;gap:.85rem;background:var(--cream);border-radius:14px;padding:.9rem 1.1rem;border:2px solid var(--border);margin-bottom:1.2rem}
.user-pill-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--green),#1a4a32);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;font-weight:700;flex-shrink:0}
.user-pill-info{flex:1;min-width:0}
.user-pill-name{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-pill-sub{font-size:.75rem;color:var(--muted)}
.auth-switch{text-align:center;font-size:.78rem;color:var(--muted);margin-top:1rem}
.auth-switch a{color:var(--green);font-weight:600;cursor:pointer;text-decoration:none}
.auth-switch a:hover{text-decoration:underline}
.auth-heading{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--green);margin-bottom:1.2rem;text-align:center}

/* FORM */
.field{margin-bottom:1rem}
.field label{display:block;font-size:.76rem;font-weight:700;color:var(--muted);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.06em}
.field input{width:100%;padding:.78rem 1rem;border:2px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.93rem;background:var(--cream);transition:all .2s;color:var(--text)}
.field input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px rgba(45,106,79,.12);background:var(--white)}
.field .hint{font-size:.72rem;color:var(--muted);margin-top:.3rem}
.btn{display:inline-flex;align-items:center;gap:.5rem;justify-content:center;padding:.8rem 1.5rem;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.93rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;width:100%}
.btn-green{background:linear-gradient(135deg,var(--green),#1a4a32);color:#fff}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,106,79,.4)}
.btn-amber{background:linear-gradient(135deg,var(--amber),#9a4418);color:#fff}
.btn-amber:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(194,105,42,.4)}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none!important}
.msg{padding:.65rem 1rem;border-radius:10px;font-size:.82rem;margin-top:.7rem;display:none}
.msg.error{background:#fee2e2;color:#991b1b;border-left:3px solid var(--absent)}
.msg.success{background:#d1fae5;color:#065f46;border-left:3px solid var(--present)}
.msg.show{display:block}

/* ── APP ── */
#appScreen{display:none;flex:1;flex-direction:column}
.app-header{background:rgba(18,50,30,.9);backdrop-filter:blur(12px);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1)}
.user-greeting{color:#fff}
.user-greeting .label{font-size:.7rem;opacity:.6;text-transform:uppercase;letter-spacing:.06em}
.user-greeting .name{font-family:'Playfair Display',serif;font-size:1.1rem}
.header-actions{display:flex;align-items:center;gap:.6rem}
.btn-hdr{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);padding:.38rem .8rem;border-radius:8px;cursor:pointer;font-size:.76rem;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:.3rem}
.btn-hdr:hover{background:rgba(255,255,255,.22)}
.btn-hdr-red{background:rgba(220,38,38,.18);color:#fca5a5;border-color:rgba(220,38,38,.3)}
.btn-hdr-red:hover{background:rgba(220,38,38,.4);color:#fff}

.app-body{flex:1;padding:1.2rem 1rem 5rem;max-width:520px;margin:0 auto;width:100%}
.date-strip{text-align:center;color:rgba(255,255,255,.82);font-size:.8rem;margin-bottom:1.2rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.date-strip .dot{width:6px;height:6px;background:var(--gold);border-radius:50%}

/* MENU CARD */
.menu-card{background:var(--white);border-radius:22px;overflow:hidden;box-shadow:var(--shadow2);margin-bottom:1.1rem;animation:fadeUp .4s ease}
.menu-hero{width:100%;height:200px;object-fit:cover;display:block}
.menu-hero-placeholder{width:100%;height:160px;background:linear-gradient(135deg,#e8f4ea,#d0e8d8);display:flex;align-items:center;justify-content:center;font-size:4rem}
.menu-card-body{padding:1.4rem}
.menu-label{font-size:.7rem;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.35rem;display:flex;align-items:center;gap:.3rem}
.menu-name{font-family:'Playfair Display',serif;font-size:1.55rem;color:var(--green);line-height:1.2}
.menu-divider{height:1px;background:var(--border);margin:1.1rem 0}
.sides-section{margin-top:.8rem}
.sides-label{font-size:.73rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem}
.side-dish-item{display:flex;align-items:center;gap:.75rem;background:var(--cream);border-radius:12px;padding:.65rem .85rem;margin-bottom:.5rem;border:1px solid var(--border)}
.side-dish-img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;border:2px solid var(--white)}
.side-dish-img-placeholder{width:44px;height:44px;border-radius:8px;background:linear-gradient(135deg,#d0e8d8,#b8d8c0);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.side-dish-name{font-size:.9rem;font-weight:600;color:var(--text)}

/* ATTENDANCE */
.att-question{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.9rem;display:flex;align-items:center;gap:.45rem}
.att-question i{color:var(--amber)}
.att-buttons{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.att-btn{padding:.95rem;border-radius:14px;cursor:pointer;border:2px solid var(--border);font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;display:flex;flex-direction:column;align-items:center;gap:.35rem;transition:all .25s;background:var(--cream)}
.att-btn .att-icon{font-size:1.65rem}
.att-btn .att-label{font-size:.78rem;font-weight:600}
.att-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:var(--shadow)}
.att-btn-present:hover:not(:disabled){background:#d1fae5;border-color:var(--present);color:var(--present)}
.att-btn-absent:hover:not(:disabled){background:#fee2e2;border-color:var(--absent);color:var(--absent)}
.att-btn:disabled{opacity:.5;cursor:not-allowed}
.att-marked{border-radius:16px;padding:1.2rem;text-align:center;animation:fadeUp .3s ease}
.att-marked.present{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border:2px solid #6ee7b7}
.att-marked.absent{background:linear-gradient(135deg,#fee2e2,#fecaca);border:2px solid #fca5a5}
.att-marked .marked-icon{font-size:2.2rem;margin-bottom:.4rem;display:block}
.att-marked .marked-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700}
.att-marked .marked-sub{font-size:.8rem;margin-top:.2rem;opacity:.75}

/* RATING */
.rating-card{background:var(--white);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:1.1rem}
.rating-card-header{background:linear-gradient(135deg,var(--green),#1a4a32);color:#fff;padding:.9rem 1.2rem;display:flex;align-items:center;gap:.6rem}
.rating-card-header i{font-size:.95rem;color:var(--gold)}
.rating-card-header h3{font-family:'Playfair Display',serif;font-size:1rem}
.rating-item{padding:1rem 1.2rem;border-bottom:1px solid var(--border)}
.rating-item:last-child{border-bottom:none}
.rating-item-name{font-weight:700;font-size:.92rem;color:var(--text);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.rating-item-type-badge{font-size:.66rem;background:rgba(45,106,79,.1);color:var(--green);border-radius:20px;padding:.1rem .45rem;font-weight:600}
.star-row{display:flex;align-items:center;gap:.3rem;margin-bottom:.5rem}
.star{font-size:1.6rem;cursor:pointer;color:#d1d5db;transition:color .15s,transform .1s;user-select:none;line-height:1}
.star.active{color:var(--star)}
.star:hover{transform:scale(1.15)}
.rating-comment{width:100%;padding:.55rem .85rem;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;resize:vertical;min-height:56px;background:var(--cream);transition:border .2s}
.rating-comment:focus{outline:none;border-color:var(--green);background:var(--white)}
.rated-badge{display:inline-flex;align-items:center;gap:.35rem;background:#d1fae5;color:#065f46;border-radius:20px;padding:.25rem .75rem;font-size:.78rem;font-weight:700;margin-bottom:.4rem}
.rating-submit-row{padding:.85rem 1.2rem;background:var(--cream);display:flex;justify-content:flex-end}
.btn-submit-rating{background:linear-gradient(135deg,var(--amber),#9a4418);color:#fff;border:none;padding:.6rem 1.4rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.4rem}
.btn-submit-rating:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(194,105,42,.4)}
.btn-submit-rating:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* HISTORY */
.history-panel{background:rgba(255,255,255,.95);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);margin-top:1rem;animation:fadeUp .3s ease}
.history-header{background:var(--cream);padding:.85rem 1.1rem;border-bottom:1px solid var(--border);font-weight:700;font-size:.88rem;color:var(--text);display:flex;align-items:center;gap:.4rem}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.1rem;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.hi-date{font-weight:700;font-size:.85rem}
.hi-day{font-size:.72rem;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .6rem;border-radius:20px;font-size:.72rem;font-weight:700}
.badge-present{background:#d1fae5;color:#065f46}
.badge-absent{background:#fee2e2;color:#991b1b}

/* NO MENU / LOADING */
.no-menu-card{background:rgba(255,255,255,.92);border-radius:22px;padding:2.5rem;text-align:center;box-shadow:var(--shadow2)}
.nm-icon{font-size:3.5rem;display:block;margin-bottom:1rem}
.no-menu-card h2{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--green);margin-bottom:.5rem}
.no-menu-card p{color:var(--muted);font-size:.88rem}
.loading-card{background:rgba(255,255,255,.85);border-radius:22px;padding:2.5rem;text-align:center;box-shadow:var(--shadow2)}
.spinner{width:28px;height:28px;border:3px solid rgba(45,106,79,.18);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:#1a1a1a;color:#fff;padding:.65rem 1.3rem;border-radius:30px;font-size:.83rem;font-weight:500;z-index:9999;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{background:var(--present)}
.toast.error{background:var(--absent)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="bg"></div>
<div id="root">

  <!-- ═══ AUTH SCREEN ═══ -->
  <div id="authScreen">
    <div class="auth-brand">
      <div class="auth-brand-icon"><i class="fa-solid fa-utensils"></i></div>
      <h1>Office Canteen</h1>
      <p>Mark attendance &amp; rate your meal</p>
    </div>

    <div class="auth-card">
      <div class="auth-card-body">

        <!-- RETURNING USER VIEW -->
        <div id="returningView" style="display:none">
          <div class="auth-heading">Welcome back! 👋</div>
          <div class="user-pill" id="userPill">
            <div class="user-pill-avatar" id="pillAvatar">?</div>
            <div class="user-pill-info">
              <div class="user-pill-name" id="pillName">—</div>
              <div class="user-pill-sub" id="pillUsername">—</div>
            </div>
          </div>
          <button class="btn btn-green" id="signInBtn" onclick="doLogin()">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
          </button>
          <div id="loginMsg" class="msg"></div>
          <div class="auth-switch">Not you? <a onclick="showNewUserView()">Register new account</a></div>
        </div>

        <!-- NEW USER VIEW -->
        <div id="newUserView" style="display:none">
          <div class="auth-heading">Join the Canteen 🍽️</div>
          <div class="field">
            <label>Your Full Name</label>
            <input type="text" id="r-name" placeholder="e.g. Rahul Sharma"
                   autocomplete="name"
                   oninput="autoCapitalize(this)"
                   onkeydown="if(event.key==='Enter')document.getElementById('r-username').focus()">
          </div>
          <div class="field">
            <label>Username</label>
            <input type="text" id="r-username" placeholder="e.g. rahul.sharma"
                   autocomplete="username"
                   onkeydown="if(event.key==='Enter')doRegister()">
            <div class="hint">Only letters, numbers, dot, underscore. No spaces.</div>
          </div>
          <button class="btn btn-amber" id="regBtn" onclick="doRegister()">
            <i class="fa-solid fa-user-plus"></i> Create Account
          </button>
          <div id="regMsg" class="msg"></div>
          <div class="auth-switch" id="switchToLogin" style="display:none">
            Already registered? <a onclick="showReturningView()">Sign in</a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ═══ APP SCREEN ═══ -->
  <div id="appScreen">
    <div class="app-header">
      <div class="user-greeting">
        <div class="label">Signed in as</div>
        <div class="name" id="userName">—</div>
        <div style="font-size:.72rem;color:rgba(255,255,255,.5);margin-top:.1rem" id="userUsername"></div>
      </div>
      <div class="header-actions">
        <button class="btn-hdr" onclick="toggleHistory()"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
        <button class="btn-hdr btn-hdr-red" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </div>

    <div class="app-body">
      <div class="date-strip">
        <span class="dot"></span>
        <span id="dateStrip">—</span>
        <span class="dot"></span>
      </div>
      <div id="mainContent"></div>
      <div id="ratingSection"></div>
      <div id="historyPanel" style="display:none"></div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycby5ZP70p6XvfovTKLAdi9MqcuhoxpwuVf-PPy5zAY5kT8POqIDyjA-HDt9fmiy9vX0ahw/exec';

// ── STATE ───────────────────────────────────────────────────
let userToken     = '';
let userData      = null;
let historyOpen   = false;
let currentMenu   = null;
let userRatings   = {};
let pendingRatings = {};
let todayStatus   = null; // 'present' | 'absent' | null

// ── API (JSONP) ─────────────────────────────────────────────
function api(params) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    const qs = Object.entries({ ...params, callback: cb })
                     .map(([k,v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
    const script = document.createElement('script');
    const timer  = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 15000);
    window[cb]   = data => { cleanup(); resolve(data); };
    function cleanup() { clearTimeout(timer); delete window[cb]; script.remove(); }
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = API_URL + '?' + qs;
    document.head.appendChild(script);
  });
}

// ── UTILS ───────────────────────────────────────────────────
function autoCapitalize(input) {
  const pos = input.selectionStart;
  input.value = input.value.replace(/\b\w/g, c => c.toUpperCase());
  input.setSelectionRange(pos, pos);
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) { return String(str||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function showMsg(id,text,type){ const el=document.getElementById(id); if(!el)return; el.textContent=text; el.className='msg '+(type||'')+' show'; }
let toastTimer;
function toast(msg,type=''){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show'+(type?' '+type:''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className='toast',3200); }

// ── INIT ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('dateStrip').textContent =
    new Date().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  userToken = localStorage.getItem('userToken') || '';
  userData  = JSON.parse(localStorage.getItem('userData') || 'null');
  const savedUsername = localStorage.getItem('savedUsername') || '';

  if (userToken && userData) {
    showApp(userData);
  } else if (savedUsername) {
    showReturningView(savedUsername);
  } else {
    showNewUserView();
  }
});

function showReturningView(username) {
  const name = localStorage.getItem('savedName') || username;
  document.getElementById('returningView').style.display = 'block';
  document.getElementById('newUserView').style.display   = 'none';
  document.getElementById('pillName').textContent     = name;
  document.getElementById('pillUsername').textContent = '@' + (username || localStorage.getItem('savedUsername') || '');
  document.getElementById('pillAvatar').textContent   = (name[0] || '?').toUpperCase();
}

function showNewUserView() {
  document.getElementById('returningView').style.display = 'none';
  document.getElementById('newUserView').style.display   = 'block';
  const savedUsername = localStorage.getItem('savedUsername');
  if (savedUsername) {
    document.getElementById('switchToLogin').style.display = 'block';
  }
}

// ── REGISTER ────────────────────────────────────────────────
async function doRegister() {
  const name  = document.getElementById('r-name').value.trim();
  const uname = document.getElementById('r-username').value.trim().toLowerCase().replace(/\s+/g,'');
  if (!name)  { showMsg('regMsg','Please enter your full name','error'); return; }
  if (!uname) { showMsg('regMsg','Please choose a username','error'); return; }
  if (!/^[a-z0-9._]+$/.test(uname)) { showMsg('regMsg','Username: only letters, numbers, dot, underscore','error'); return; }

  const btn = document.getElementById('regBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px"></span> Creating…';
  try {
    const res = await api({ action:'register', name, username:uname });
    if (res.success) {
      saveSession(res);
      showApp(res);
      toast('Welcome, ' + res.name + '! 🎉','success');
    } else {
      showMsg('regMsg', res.message, 'error');
    }
  } catch(e) { showMsg('regMsg','Connection error. Please try again.','error'); }
  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
}

// ── LOGIN (returning user) ───────────────────────────────────
async function doLogin() {
  const savedUsername = localStorage.getItem('savedUsername') || '';
  if (!savedUsername) { showReturningView(''); return; }

  const btn = document.getElementById('signInBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px"></span> Signing in…';
  try {
    const res = await api({ action:'login', username: savedUsername });
    if (res.success) {
      saveSession(res);
      showApp(res);
    } else {
      showMsg('loginMsg', res.message, 'error');
    }
  } catch(e) { showMsg('loginMsg','Connection error. Please try again.','error'); }
  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
}

// ── SESSION ──────────────────────────────────────────────────
function saveSession(res) {
  userToken = res.token;
  userData  = { name: res.name, username: res.username };
  localStorage.setItem('userToken',    userToken);
  localStorage.setItem('userData',     JSON.stringify(userData));
  localStorage.setItem('savedUsername', res.username);
  localStorage.setItem('savedName',     res.name);
}

function doLogout() {
  userToken = ''; userData = null; todayStatus = null;
  localStorage.removeItem('userToken');
  localStorage.removeItem('userData');
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display  = 'none';
  showReturningView();
}

// ── SHOW APP ─────────────────────────────────────────────────
function showApp(user) {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display  = 'flex';
  document.getElementById('userName').textContent    = user.name;
  document.getElementById('userUsername').textContent = '@' + user.username;
  loadMenuAndAttendance();
}

// ── MENU + ATTENDANCE ────────────────────────────────────────
async function loadMenuAndAttendance() {
  document.getElementById('mainContent').innerHTML = `
    <div class="loading-card">
      <span class="spinner" style="width:36px;height:36px;border-width:3px;display:block;margin:0 auto 1rem"></span>
      <p style="color:var(--muted);font-size:.88rem">Loading today's menu…</p>
    </div>`;
  document.getElementById('ratingSection').innerHTML = '';

  try {
    const [menuRes, attRes, ratRes] = await Promise.all([
      api({ action:'getMenu' }),
      api({ action:'checkAttendance', token:userToken }),
      api({ action:'getMyRatings',    token:userToken })
    ]);

    if (attRes.message?.includes('session')) { doLogout(); return; }

    currentMenu    = menuRes.menu;
    userRatings    = ratRes.ratings || {};
    pendingRatings = {};
    todayStatus    = attRes.marked ? attRes.status : null;

    if (!currentMenu) {
      document.getElementById('mainContent').innerHTML = `
        <div class="no-menu-card">
          <span class="nm-icon">🍽️</span>
          <h2>Menu Not Set Yet</h2>
          <p>Today's menu hasn't been announced. Check back later!</p>
        </div>`;
      return;
    }

    renderMenuCard(currentMenu, attRes);
    // Only show rating section if user is present (or hasn't marked yet)
    if (!attRes.marked || attRes.status === 'present') {
      renderRatingSection(currentMenu);
    }
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="no-menu-card">
        <span class="nm-icon">⚠️</span>
        <h2>Connection Error</h2>
        <p>Could not load menu. <a href="#" onclick="loadMenuAndAttendance()" style="color:var(--amber)">Try again</a></p>
      </div>`;
  }
}

function renderMenuCard(menu, attRes) {
  const heroHtml = menu.mainCourseImg
    ? `<img src="${escHtml(menu.mainCourseImg)}" class="menu-hero" loading="eager" alt="${escHtml(menu.mainCourse)}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
  const heroPlaceholder = !menu.mainCourseImg
    ? `<div class="menu-hero-placeholder">🍱</div>`
    : `<div class="menu-hero-placeholder" style="display:none">🍱</div>`;

  const sidesHtml = (menu.sideDishes||[]).length ? `
    <div class="sides-section">
      <div class="sides-label"><i class="fa-solid fa-leaf" style="color:var(--green);font-size:.75rem"></i> Side Dishes</div>
      ${menu.sideDishes.map(s => {
        const sImg = s.imgUrl
          ? `<img src="${escHtml(s.imgUrl)}" class="side-dish-img" alt="${escHtml(s.name||'')}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="side-dish-img-placeholder" style="display:none">🥗</div>`
          : `<div class="side-dish-img-placeholder">🥗</div>`;
        return `<div class="side-dish-item">${sImg}<div class="side-dish-name">${escHtml(s.name||'')}</div></div>`;
      }).join('')}
    </div>` : '';

  const attHtml = attRes.marked
    ? buildMarkedHtml(attRes.status)
    : `<div class="att-question"><i class="fa-solid fa-circle-question"></i> Will you have lunch today?</div>
       <div class="att-buttons">
         <button class="att-btn att-btn-present" onclick="markAttendance('present')">
           <span class="att-icon">✅</span><span class="att-label">Yes, I'll eat!</span>
         </button>
         <button class="att-btn att-btn-absent" onclick="markAttendance('absent')">
           <span class="att-icon">🚫</span><span class="att-label">No, I'll skip</span>
         </button>
       </div>`;

  document.getElementById('mainContent').innerHTML = `
    <div class="menu-card">
      ${heroHtml}${heroPlaceholder}
      <div class="menu-card-body">
        <div class="menu-label"><i class="fa-solid fa-star"></i> Today's Main Course</div>
        <div class="menu-name">${escHtml(menu.mainCourse)}</div>
        ${sidesHtml}
        <div class="menu-divider"></div>
        <div id="attendanceSection">${attHtml}</div>
      </div>
    </div>`;
}

function buildMarkedHtml(status) {
  const p = status === 'present';
  return `<div class="att-marked ${status}">
    <span class="marked-icon">${p?'✅':'🚫'}</span>
    <div class="marked-title">${p?'Attending Lunch!':'Skipping Today'}</div>
    <div class="marked-sub">${p?'Your attendance is confirmed. Enjoy your meal!':'You\'ve marked absent for today.'}</div>
  </div>`;
}

async function markAttendance(status) {
  document.querySelectorAll('.att-btn').forEach(b => b.disabled = true);
  try {
    const res = await api({ action:'markAttendance', token:userToken, status });
    if (res.success) {
      todayStatus = status;
      document.getElementById('attendanceSection').innerHTML = buildMarkedHtml(status);
      toast(res.message, 'success');
      // Hide rating section if absent
      if (status === 'absent') {
        document.getElementById('ratingSection').innerHTML = '';
      } else if (status === 'present' && currentMenu) {
        renderRatingSection(currentMenu);
      }
    } else if (res.alreadyMarked) {
      todayStatus = res.status;
      document.getElementById('attendanceSection').innerHTML = buildMarkedHtml(res.status);
    } else if (res.message?.includes('session')) {
      doLogout();
    } else {
      toast(res.message||'Error','error');
      document.querySelectorAll('.att-btn').forEach(b => b.disabled = false);
    }
  } catch(e) {
    toast('Network error. Try again.','error');
    document.querySelectorAll('.att-btn').forEach(b => b.disabled = false);
  }
}

// ── RATINGS ──────────────────────────────────────────────────
function renderRatingSection(menu) {
  if (!menu) return;
  const items = [
    { name: menu.mainCourse, type: 'main' },
    ...(menu.sideDishes||[]).map(d => ({ name: d.name, type: 'side' }))
  ].filter(i => i.name);

  const itemsHtml = items.map((item, idx) => {
    const existing  = userRatings[item.name];
    const typeLabel = item.type === 'main' ? 'Main Course' : 'Side Dish';
    const ratedHtml = existing
      ? `<div class="rated-badge"><i class="fa-solid fa-check"></i> Rated ${existing.rating}★</div>` : '';
    const starsHtml = [1,2,3,4,5].map(s => {
      const active = existing && existing.rating >= s ? 'active' : '';
      return `<span class="star ${active}" onclick="setRating('${escAttr(item.name)}',${s})" id="star-${idx}-${s}">★</span>`;
    }).join('');
    const commentVal = existing ? escHtml(existing.comment||'') : '';
    return `
      <div class="rating-item" id="ritem-${idx}">
        <div class="rating-item-name">
          ${escHtml(item.name)}
          <span class="rating-item-type-badge">${typeLabel}</span>
        </div>
        ${ratedHtml}
        <div class="star-row" id="stars-${idx}">${starsHtml}</div>
        <textarea class="rating-comment" id="comment-${idx}" placeholder="Add a comment (optional)…" rows="2">${commentVal}</textarea>
      </div>`;
  }).join('');

  document.getElementById('ratingSection').innerHTML = `
    <div class="rating-card">
      <div class="rating-card-header">
        <i class="fa-solid fa-star"></i>
        <h3>Rate Today's Menu</h3>
      </div>
      ${itemsHtml}
      <div class="rating-submit-row">
        <button class="btn-submit-rating" id="ratingSubmitBtn" onclick="submitAllRatings()">
          <i class="fa-solid fa-paper-plane"></i> Submit Ratings
        </button>
      </div>
    </div>`;

  items.forEach((item) => {
    const existing = userRatings[item.name];
    if (existing) pendingRatings[item.name] = { ...existing, type: item.type };
  });
}

function setRating(itemName, rating) {
  const items = currentMenu ? [
    { name: currentMenu.mainCourse, type: 'main' },
    ...(currentMenu.sideDishes||[]).map(d => ({ name: d.name, type: 'side' }))
  ].filter(i=>i.name) : [];
  const idx = items.findIndex(i => i.name === itemName);
  if (idx < 0) return;
  if (!pendingRatings[itemName]) pendingRatings[itemName] = { type: items[idx].type };
  pendingRatings[itemName].rating = rating;
  for (let s=1;s<=5;s++) {
    const el = document.getElementById(`star-${idx}-${s}`);
    if (el) el.className = 'star' + (s <= rating ? ' active' : '');
  }
}

async function submitAllRatings() {
  const items = currentMenu ? [
    { name: currentMenu.mainCourse, type: 'main' },
    ...(currentMenu.sideDishes||[]).map(d => ({ name: d.name, type: 'side' }))
  ].filter(i=>i.name) : [];

  const toSubmit = [];
  items.forEach((item, idx) => {
    const pending = pendingRatings[item.name];
    const comment = document.getElementById(`comment-${idx}`)?.value?.trim() || '';
    if (pending && pending.rating) toSubmit.push({ itemName: item.name, itemType: item.type, rating: pending.rating, comment });
  });

  if (!toSubmit.length) { toast('Please select a star rating first','error'); return; }

  const btn = document.getElementById('ratingSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px"></span> Submitting…';
  try {
    for (const r of toSubmit) await api({ action:'submitRating', token:userToken, ...r });
    toast(`${toSubmit.length} rating${toSubmit.length>1?'s':''} submitted! 🙏`,'success');
    const ratRes = await api({ action:'getMyRatings', token:userToken });
    userRatings = ratRes.ratings || {};
    renderRatingSection(currentMenu);
  } catch(e) { toast('Could not submit. Try again.','error'); }
  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit Ratings';
}

// ── HISTORY ──────────────────────────────────────────────────
async function toggleHistory() {
  historyOpen = !historyOpen;
  const panel = document.getElementById('historyPanel');
  panel.style.display = historyOpen ? 'block' : 'none';
  if (!historyOpen) return;

  panel.innerHTML = `<div class="history-panel">
    <div class="history-header"><i class="fa-solid fa-clock-rotate-left"></i> My Attendance</div>
    <div id="historyList" style="text-align:center;padding:1.5rem"><span class="spinner"></span></div>
  </div>`;
  try {
    const res = await api({ action:'getMyAttendance', token:userToken });
    const list = document.getElementById('historyList');
    if (!res.records||!res.records.length) {
      list.innerHTML = '<div style="padding:1rem;color:var(--muted);font-size:.85rem">No records yet.</div>';
      return;
    }
    list.innerHTML = res.records.map(r => {
      const d = new Date(r.date + 'T00:00:00');
      return `<div class="history-item">
        <div><div class="hi-date">${d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
             <div class="hi-day">${d.toLocaleDateString('en-IN',{weekday:'short'})}</div></div>
        <span class="badge badge-${r.status}">${r.status==='present'?'✓ Present':'✗ Absent'}</span>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('historyList').innerHTML = '<div style="padding:1rem;color:var(--muted)">Could not load.</div>';
  }
}
</script>
